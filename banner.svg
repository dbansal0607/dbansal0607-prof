<svg width="900" height="165" viewBox="0 0 900 165" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#060c1a"/>
    <stop offset="60%" stop-color="#071525"/>
    <stop offset="100%" stop-color="#0a1e38"/>
  </linearGradient>
  <radialGradient id="nucl" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#ffffff"/>
    <stop offset="30%" stop-color="#7dd3fc"/>
    <stop offset="100%" stop-color="#0066cc"/>
  </radialGradient>
  <radialGradient id="eRad" cx="30%" cy="30%" r="70%">
    <stop offset="0%" stop-color="#ffffff"/>
    <stop offset="100%" stop-color="#00bfff"/>
  </radialGradient>
  <radialGradient id="glowCenter" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#00bfff" stop-opacity="0.25"/>
    <stop offset="100%" stop-color="#00bfff" stop-opacity="0"/>
  </radialGradient>
  <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
    <feGaussianBlur stdDeviation="3" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="bigGlow" x="-120%" y="-120%" width="340%" height="340%">
    <feGaussianBlur stdDeviation="8" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
    <feGaussianBlur stdDeviation="1.5" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <clipPath id="clip">
    <rect width="900" height="165" rx="14"/>
  </clipPath>
</defs>

<!-- Background -->
<rect width="900" height="165" rx="14" fill="url(#bg)"/>

<!-- Everything clipped to rounded rect -->
<g clip-path="url(#clip)">

  <!-- Subtle background grid dots -->
  <g opacity="0.09" fill="#00bfff">
    <circle cx="60" cy="25" r="1.2"/><circle cx="120" cy="25" r="1.2"/><circle cx="180" cy="25" r="1.2"/>
    <circle cx="240" cy="25" r="1.2"/><circle cx="300" cy="25" r="1.2"/><circle cx="360" cy="25" r="1.2"/>
    <circle cx="420" cy="25" r="1.2"/><circle cx="480" cy="25" r="1.2"/><circle cx="540" cy="25" r="1.2"/>
    <circle cx="60" cy="55" r="1.2"/><circle cx="120" cy="55" r="1.2"/><circle cx="180" cy="55" r="1.2"/>
    <circle cx="240" cy="55" r="1.2"/><circle cx="300" cy="55" r="1.2"/><circle cx="360" cy="55" r="1.2"/>
    <circle cx="420" cy="55" r="1.2"/><circle cx="480" cy="55" r="1.2"/><circle cx="540" cy="55" r="1.2"/>
    <circle cx="60" cy="85" r="1.2"/><circle cx="120" cy="85" r="1.2"/><circle cx="180" cy="85" r="1.2"/>
    <circle cx="240" cy="85" r="1.2"/><circle cx="300" cy="85" r="1.2"/><circle cx="360" cy="85" r="1.2"/>
    <circle cx="420" cy="85" r="1.2"/><circle cx="480" cy="85" r="1.2"/><circle cx="540" cy="85" r="1.2"/>
    <circle cx="60" cy="115" r="1.2"/><circle cx="120" cy="115" r="1.2"/><circle cx="180" cy="115" r="1.2"/>
    <circle cx="240" cy="115" r="1.2"/><circle cx="300" cy="115" r="1.2"/><circle cx="360" cy="115" r="1.2"/>
    <circle cx="420" cy="115" r="1.2"/><circle cx="480" cy="115" r="1.2"/><circle cx="540" cy="115" r="1.2"/>
    <circle cx="60" cy="145" r="1.2"/><circle cx="120" cy="145" r="1.2"/><circle cx="180" cy="145" r="1.2"/>
    <circle cx="240" cy="145" r="1.2"/><circle cx="300" cy="145" r="1.2"/><circle cx="360" cy="145" r="1.2"/>
  </g>

  <!-- Scan line animation -->
  <rect x="0" y="0" width="900" height="3" fill="#00bfff" opacity="0">
    <animate attributeName="y" values="-3;168" dur="4s" repeatCount="indefinite" calcMode="linear"/>
    <animate attributeName="opacity" values="0;0.12;0.12;0" keyTimes="0;0.05;0.95;1" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- Floating particles -->
  <circle cx="580" cy="40" r="2" fill="#00bfff" opacity="0.5" filter="url(#soft)">
    <animate attributeName="cy" values="40;28;40" dur="4.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.9;0.5" dur="4.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="620" cy="125" r="1.5" fill="#00bfff" opacity="0.4" filter="url(#soft)">
    <animate attributeName="cy" values="125;110;125" dur="3.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="3.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="550" cy="80" r="1.8" fill="#7dd3fc" opacity="0.35" filter="url(#soft)">
    <animate attributeName="cy" values="80;68;80" dur="5.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.35;0.7;0.35" dur="5.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="640" cy="60" r="1.2" fill="#00bfff" opacity="0.3">
    <animate attributeName="cy" values="60;50;60" dur="3.1s" repeatCount="indefinite"/>
  </circle>

</g>

<!-- Border glow -->
<rect x="1.5" y="1.5" width="897" height="162" rx="13" fill="none" stroke="#00bfff" stroke-width="1.8" opacity="0.5">
  <animate attributeName="opacity" values="0.3;0.75;0.3" dur="3s" repeatCount="indefinite"/>
</rect>

<!-- HUD corner — top left -->
<line x1="14" y1="22" x2="14" y2="14" stroke="#00bfff" stroke-width="2" opacity="0.9"/>
<line x1="14" y1="14" x2="26" y2="14" stroke="#00bfff" stroke-width="2" opacity="0.9"/>
<!-- HUD corner — top right -->
<line x1="886" y1="22" x2="886" y2="14" stroke="#00bfff" stroke-width="2" opacity="0.9"/>
<line x1="874" y1="14" x2="886" y2="14" stroke="#00bfff" stroke-width="2" opacity="0.9"/>
<!-- HUD corner — bottom left -->
<line x1="14" y1="143" x2="14" y2="151" stroke="#00bfff" stroke-width="2" opacity="0.9"/>
<line x1="14" y1="151" x2="26" y2="151" stroke="#00bfff" stroke-width="2" opacity="0.9"/>
<!-- HUD corner — bottom right -->
<line x1="886" y1="143" x2="886" y2="151" stroke="#00bfff" stroke-width="2" opacity="0.9"/>
<line x1="874" y1="151" x2="886" y2="151" stroke="#00bfff" stroke-width="2" opacity="0.9"/>

<!-- Left accent bar (pulsing) -->
<rect x="34" y="30" width="3.5" height="105" rx="2" fill="#00bfff" filter="url(#glow)">
  <animate attributeName="opacity" values="0.6;1;0.6" dur="2.2s" repeatCount="indefinite"/>
</rect>

<!-- Name text -->
<text x="52" y="78"
  font-family="'Courier New', Courier, monospace"
  font-size="38" font-weight="800"
  fill="#ffffff" letter-spacing="0.5"
  filter="url(#glow)">Hi! I'm Dhruv Bansal</text>

<!-- Blinking cursor after name -->
<rect x="510" y="48" width="3" height="34" rx="1" fill="#00bfff">
  <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.45;0.5;0.95" dur="1.1s" repeatCount="indefinite"/>
</rect>

<!-- Subtitle -->
<text x="54" y="112"
  font-family="'Courier New', Courier, monospace"
  font-size="14" font-weight="400"
  fill="#38bdf8" letter-spacing="2.2"
  opacity="0.88">Backend Engineer  ·  AI/ML Builder  ·  VIT Vellore '26</text>

<!-- Small tag labels -->
<g font-family="'Courier New', Courier, monospace" font-size="10.5" fill="#00bfff">
  <!-- Python tag -->
  <rect x="54" y="126" width="54" height="18" rx="4" fill="none" stroke="#00bfff" stroke-width="1" opacity="0.5"/>
  <text x="64" y="139" opacity="0.8">Python</text>
  <!-- FastAPI tag -->
  <rect x="116" y="126" width="56" height="18" rx="4" fill="none" stroke="#00bfff" stroke-width="1" opacity="0.5"/>
  <text x="124" y="139" opacity="0.8">FastAPI</text>
  <!-- Node.js tag -->
  <rect x="180" y="126" width="56" height="18" rx="4" fill="none" stroke="#00bfff" stroke-width="1" opacity="0.5"/>
  <text x="188" y="139" opacity="0.8">Node.js</text>
  <!-- AI/ML tag -->
  <rect x="244" y="126" width="44" height="18" rx="4" fill="none" stroke="#00bfff" stroke-width="1" opacity="0.5"/>
  <text x="252" y="139" opacity="0.8">AI/ML</text>
</g>

<!-- ═══════════ ATOM ═══════════ -->
<g transform="translate(800, 82)">

  <!-- Ambient glow behind atom -->
  <circle r="72" fill="url(#glowCenter)"/>

  <!-- Orbit 1 — flat horizontal -->
  <g transform="rotate(0)">
    <ellipse rx="52" ry="19" fill="none" stroke="#00bfff" stroke-width="0.9" opacity="0.3"/>
    <circle r="5.5" fill="url(#eRad)" filter="url(#glow)">
      <animateMotion dur="3s" repeatCount="indefinite"
        path="M 52,0 A 52,19,0,1,0,-52,0 A 52,19,0,1,0,52,0"/>
    </circle>
  </g>

  <!-- Orbit 2 — tilted 60° -->
  <g transform="rotate(60)">
    <ellipse rx="52" ry="19" fill="none" stroke="#00bfff" stroke-width="0.9" opacity="0.3"/>
    <circle r="5.5" fill="url(#eRad)" filter="url(#glow)">
      <animateMotion dur="2.1s" repeatCount="indefinite"
        path="M 52,0 A 52,19,0,1,0,-52,0 A 52,19,0,1,0,52,0"/>
    </circle>
  </g>

  <!-- Orbit 3 — tilted -60° -->
  <g transform="rotate(-60)">
    <ellipse rx="52" ry="19" fill="none" stroke="#00bfff" stroke-width="0.9" opacity="0.3"/>
    <circle r="5.5" fill="url(#eRad)" filter="url(#glow)">
      <animateMotion dur="1.6s" repeatCount="indefinite"
        path="M 52,0 A 52,19,0,1,0,-52,0 A 52,19,0,1,0,52,0"/>
    </circle>
  </g>

  <!-- Nucleus glow ring -->
  <circle r="20" fill="#00bfff" opacity="0.08" filter="url(#bigGlow)">
    <animate attributeName="r" values="18;24;18" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.08;0.18;0.08" dur="2.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Nucleus core -->
  <circle r="11" fill="url(#nucl)" filter="url(#glow)">
    <animate attributeName="r" values="10;12.5;10" dur="2.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Nucleus inner shine -->
  <circle cx="-3" cy="-3" r="4" fill="white" opacity="0.35"/>

</g>
<!-- ═══════════ END ATOM ═══════════ -->

<!-- Divider line between text and atom -->
<line x1="680" y1="30" x2="680" y2="135" stroke="#00bfff" stroke-width="0.8" opacity="0.2"/>

</svg>
